<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ouvrir CollabManga</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050b1d;
        --panel: #0b1430;
        --elevated: #101b3f;
        --text: #f7faff;
        --muted: #b8c4e5;
        --line: rgba(133, 154, 206, 0.24);
        --accent: #39ff88;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Manrope,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.2;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 14px;
        background: var(--accent);
        color: #04111e;
        font-weight: 800;
        text-decoration: none;
      }

      code {
        display: block;
        margin-top: 16px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--elevated);
        color: var(--text);
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CollabManga local</h1>
      <p>
        Ce fichier est permanent. Si l'application ne s'ouvre pas, demarre le serveur
        avec le fichier ci-dessous, puis reviens ici.
      </p>
      <a href="http://127.0.0.1:8092/ai">Ouvrir l'application</a>
      <code>start-collabmanga-local.cmd</code>
    </main>
  </body>
</html>
